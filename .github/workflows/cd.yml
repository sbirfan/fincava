name: CD – Production Release

on:
  # Triggers only after CI passes on main
    workflow_run:
        workflows: [CI]
            types: [completed]
                branches: [main]

                  # Also allows manual trigger from the GitHub Actions UI
                    workflow_dispatch:
                        inputs:
                              reason:
                                      description: 'Reason for manual deployment'
                                              required: true
                                                      default: 'Manual release'

                                                      env:
                                                        NODE_VERSION: '24'
                                                          PNPM_VERSION: '10'

                                                          jobs:
                                                            # ─────────────────────────────────────────────
                                                              # Guard: only run CD if CI succeeded
                                                                # ─────────────────────────────────────────────
                                                                  check-ci:
                                                                      name: Verify CI passed
                                                                          runs-on: ubuntu-latest
                                                                              if: >
                                                                                    github.event_name == 'workflow_dispatch' ||
                                                                                          github.event.workflow_run.conclusion == 'success'
                                                                                              steps:
                                                                                                    - name: CI status OK
                                                                                                            run: echo "CI passed or manual trigger – proceeding to CD."
                                                                                                            
                                                                                                              # ─────────────────────────────────────────────
                                                                                                                # Production build (clean, reproducible)
                                                                                                                  # ─────────────────────────────────────────────
                                                                                                                    production-build:
                                                                                                                        name: Production Build
                                                                                                                            runs-on: ubuntu-latest
                                                                                                                                needs: check-ci
                                                                                                                                    steps:
                                                                                                                                          - name: Checkout code
                                                                                                                                                  uses: actions/checkout@v4
                                                                                                                                                  
                                                                                                                                                        - name: Setup pnpm
                                                                                                                                                                uses: pnpm/action-setup@v4
                                                                                                                                                                        with:
                                                                                                                                                                                  version: ${{ env.PNPM_VERSION }}
                                                                                                                                                                                  
                                                                                                                                                                                        - name: Setup Node.js
                                                                                                                                                                                                uses: actions/setup-node@v4
                                                                                                                                                                                                        with:
                                                                                                                                                                                                                  node-version: ${{ env.NODE_VERSION }}
                                                                                                                                                                                                                            cache: pnpm
                                                                                                                                                                                                                            
                                                                                                                                                                                                                                  - name: Install dependencies
                                                                                                                                                                                                                                          run: pnpm install --frozen-lockfile
                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                - name: Production build
                                                                                                                                                                                                                                                        run: pnpm run build
                                                                                                                                                                                                                                                                env:
                                                                                                                                                                                                                                                                          NODE_ENV: production
                                                                                                                                                                                                                                                                                    CI: true
                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                          - name: Upload production artifacts
                                                                                                                                                                                                                                                                                                  uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                          with:
                                                                                                                                                                                                                                                                                                                    name: production-build-${{ github.sha }}
                                                                                                                                                                                                                                                                                                                              path: |
                                                                                                                                                                                                                                                                                                                                          artifacts/api-server/dist/
                                                                                                                                                                                                                                                                                                                                                      artifacts/fincava/dist/
                                                                                                                                                                                                                                                                                                                                                                  artifacts/mockup-sandbox/dist/
                                                                                                                                                                                                                                                                                                                                                                            retention-days: 30
                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                              # ─────────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                # Manual approval gate before release
                                                                                                                                                                                                                                                                                                                                                                                  # This creates a GitHub Environment "production"
                                                                                                                                                                                                                                                                                                                                                                                    # so you can review & approve in the GitHub UI
                                                                                                                                                                                                                                                                                                                                                                                      # before anything is deployed.
                                                                                                                                                                                                                                                                                                                                                                                        # ─────────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                          await-approval:
                                                                                                                                                                                                                                                                                                                                                                                              name: Awaiting Production Approval
                                                                                                                                                                                                                                                                                                                                                                                                  runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                                      needs: production-build
                                                                                                                                                                                                                                                                                                                                                                                                          environment:
                                                                                                                                                                                                                                                                                                                                                                                                                name: production
                                                                                                                                                                                                                                                                                                                                                                                                                      # Add URL here once you have a deployment target
                                                                                                                                                                                                                                                                                                                                                                                                                            # url: https://your-app-url.com
                                                                                                                                                                                                                                                                                                                                                                                                                                steps:
                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Approval granted
                                                                                                                                                                                                                                                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "Production release approved by: ${{ github.actor }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo "Commit: ${{ github.sha }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "Triggered by: ${{ github.event_name }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # ─────────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                # Release step – runs after approval
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  # Replace the echo commands with your actual
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    # deployment commands when ready
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      # (e.g., Replit deploy API, Docker push, etc.)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        # ─────────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          release:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              name: Release to Production
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      needs: await-approval
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          steps:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: Checkout code
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Download production artifacts
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      uses: actions/download-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        name: production-build-${{ github.sha }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  path: ./dist
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Verify artifact contents
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo "=== Production artifacts ready ==="
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    find ./dist -type f | head -30
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "=================================="
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - name: Tag release
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "Release SHA: ${{ github.sha }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                echo "Release timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          # Future: create a GitHub Release tag here
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    # gh release create v$VERSION --generate-notes
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          # ── Deployment placeholder ────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                # Uncomment and fill in when you choose a
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      # deployment target (Render, Railway, Fly.io,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            # AWS, etc.)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  #
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        # - name: Deploy API server
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              #   run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    #     curl -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          #       -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                #
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      # - name: Deploy frontend
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            #   run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  #     # Example: push to Vercel / Netlify / S3
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        # ─────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Release summary
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                echo ""
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo "✅ FinCava-Hub production release complete"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    echo "   Commit : ${{ github.sha }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              echo "   Actor  : ${{ github.actor }}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "   Time   : $(date -u)"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  echo ""
