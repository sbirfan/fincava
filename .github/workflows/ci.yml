name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10'
jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            artifacts/*/node_modules
            lib/*/node_modules
            scripts/node_modules
            ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            artifacts/*/node_modules
            lib/*/node_modules
            scripts/node_modules
            ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: Typecheck all packages
        run: pnpm run typecheck
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            artifacts/*/node_modules
            lib/*/node_modules
            scripts/node_modules
            ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: Build all packages
        run: pnpm run build
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            artifacts/api-server/dist/
            artifacts/fincava/dist/
            artifacts/mockup-sandbox/dist/
          retention-days: 7
          if-no-files-found: warn
  test-frontend:
    name: Test - Frontend
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            artifacts/*/node_modules
            lib/*/node_modules
            scripts/node_modules
            ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: Run frontend tests
        run: pnpm --filter @workspace/fincava run test --reporter=verbose
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results
          path: artifacts/fincava/test-results/
          retention-days: 7
          if-no-files-found: ignore
  test-api:
    name: Test - API Server
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fincava
          POSTGRES_PASSWORD: fincava_test
          POSTGRES_DB: fincava_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            artifacts/*/node_modules
            lib/*/node_modules
            scripts/node_modules
            ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: Run API tests
        run: pnpm --filter @workspace/api-server run test --reporter=verbose
        env:
          DATABASE_URL: postgresql://fincava:fincava_test@localhost:5432/fincava_test
          NODE_ENV: test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: artifacts/api-server/test-results/
          retention-days: 7
          if-no-files-found: ignore
  ci-success:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [typecheck, build, test-frontend, test-api]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.typecheck.result }}" != "success" || \
                "${{ needs.build.result }}" != "success" || \
                "${{ needs.test-frontend.result }}" != "success" || \
                "${{ needs.test-api.result }}" != "success" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI checks passed!"
