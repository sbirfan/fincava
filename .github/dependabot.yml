version: 2

updates:
  # ── pnpm workspace (root + all packages) ────
    - package-ecosystem: npm
        directory: /
            schedule:
                  interval: weekly
                        day: monday
                              time: "09:00"
                                    timezone: America/Chicago
                                        open-pull-requests-limit: 10
                                            labels:
                                                  - dependencies
                                                        - automated
                                                            groups:
                                                                  # Group all Radix UI updates into one PR
                                                                        radix-ui:
                                                                                patterns:
                                                                                          - "@radix-ui/*"
                                                                                                # Group all Replit plugin updates
                                                                                                      replit-plugins:
                                                                                                              patterns:
                                                                                                                        - "@replit/*"
                                                                                                                              # Group all TypeScript / type definitions
                                                                                                                                    typescript-types:
                                                                                                                                            patterns:
                                                                                                                                                      - "typescript"
                                                                                                                                                                - "@types/*"
                                                                                                                                                                      # Group all Tailwind-related packages
                                                                                                                                                                            tailwind:
                                                                                                                                                                                    patterns:
                                                                                                                                                                                              - "tailwindcss"
                                                                                                                                                                                                        - "@tailwindcss/*"
                                                                                                                                                                                                                  - "tailwind-merge"
                                                                                                                                                                                                                            - "tw-animate-css"
                                                                                                                                                                                                                                  # Group all Tanstack packages
                                                                                                                                                                                                                                        tanstack:
                                                                                                                                                                                                                                                patterns:
                                                                                                                                                                                                                                                          - "@tanstack/*"
                                                                                                                                                                                                                                                                # Group Drizzle ORM
                                                                                                                                                                                                                                                                      drizzle:
                                                                                                                                                                                                                                                                              patterns:
                                                                                                                                                                                                                                                                                        - "drizzle-orm"
                                                                                                                                                                                                                                                                                                  - "drizzle-kit"
                                                                                                                                                                                                                                                                                                      ignore:
                                                                                                                                                                                                                                                                                                            # Pin major versions – review manually
                                                                                                                                                                                                                                                                                                                  - dependency-name: "express"
                                                                                                                                                                                                                                                                                                                          update-types: ["version-update:semver-major"]
                                                                                                                                                                                                                                                                                                                                - dependency-name: "react"
                                                                                                                                                                                                                                                                                                                                        update-types: ["version-update:semver-major"]
                                                                                                                                                                                                                                                                                                                                              - dependency-name: "react-dom"
                                                                                                                                                                                                                                                                                                                                                      update-types: ["version-update:semver-major"]
                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                        # ── GitHub Actions ───────────────────────────
                                                                                                                                                                                                                                                                                                                                                          - package-ecosystem: github-actions
                                                                                                                                                                                                                                                                                                                                                              directory: /
                                                                                                                                                                                                                                                                                                                                                                  schedule:
                                                                                                                                                                                                                                                                                                                                                                        interval: weekly
                                                                                                                                                                                                                                                                                                                                                                              day: monday
                                                                                                                                                                                                                                                                                                                                                                                    time: "09:00"
                                                                                                                                                                                                                                                                                                                                                                                          timezone: America/Chicago
                                                                                                                                                                                                                                                                                                                                                                                              open-pull-requests-limit: 5
                                                                                                                                                                                                                                                                                                                                                                                                  labels:
                                                                                                                                                                                                                                                                                                                                                                                                        - dependencies
                                                                                                                                                                                                                                                                                                                                                                                                              - github-actions
                                                                                                                                                                                                                                                                                                                                                                                                                    - automated
